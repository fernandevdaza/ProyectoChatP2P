name: Build and Update Latest Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  APP_NAME: ChatP2P
  MAIN_CLASS: com.fernandev.chatp2p.Main
  JAVA_VERSION: '21'
  JAR_FILE: ChatP2P-jar-with-dependencies.jar
  RELEASE_TAG: latest-main

jobs:
  build-linux:
    name: Build Linux installers
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Install Linux packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot rpm

      - name: Build JAR
        run: mvn -B clean package

      - name: Verify JAR exists
        run: |
          ls -lah target
          test -f "target/${{ env.JAR_FILE }}"

      - name: Build DEB
        run: |
          mkdir -p dist/linux/deb
          jpackage \
            --type deb \
            --name "${{ env.APP_NAME }}" \
            --input target \
            --main-jar "${{ env.JAR_FILE }}" \
            --main-class "${{ env.MAIN_CLASS }}" \
            --dest dist/linux/deb \
            --icon src/main/resources/view/favicon.png \
            --linux-shortcut \
            --vendor "UPB" \
            --app-version "1.0.${{ github.run_number }}"

      - name: Build RPM
        run: |
          mkdir -p dist/linux/rpm
          jpackage \
            --type rpm \
            --name "${{ env.APP_NAME }}" \
            --input target \
            --main-jar "${{ env.JAR_FILE }}" \
            --main-class "${{ env.MAIN_CLASS }}" \
            --dest dist/linux/rpm \
            --icon src/main/resources/view/favicon.png \
            --linux-shortcut \
            --vendor "UPB" \
            --app-version "1.0.${{ github.run_number }}"

      - name: Build AppImage
        run: |
          mkdir -p dist/linux/app-image
          jpackage \
            --type app-image \
            --name "${{ env.APP_NAME }}" \
            --input target \
            --main-jar "${{ env.JAR_FILE }}" \
            --main-class "${{ env.MAIN_CLASS }}" \
            --dest dist/linux/app-image \
            --icon src/main/resources/view/favicon.png \
            --vendor "UPB" \
            --app-version "1.0.${{ github.run_number }}"
          
          wget -c "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool-x86_64.AppImage
          
          mkdir -p AppDir/usr
          cp -r dist/linux/app-image/${{ env.APP_NAME }}/* AppDir/usr/
          
          cat <<EOF > AppDir/AppRun
          #!/bin/bash
          HERE="\$(dirname "\$(readlink -f "\${0}")")"
          exec "\${HERE}/usr/bin/${{ env.APP_NAME }}" "\$@"
          EOF
          chmod +x AppDir/AppRun
          
          cp src/main/resources/view/favicon.png AppDir/${{ env.APP_NAME }}.png
          
          cat <<EOF > AppDir/${{ env.APP_NAME }}.desktop
          [Desktop Entry]
          Name=${{ env.APP_NAME }}
          Exec=${{ env.APP_NAME }}
          Icon=${{ env.APP_NAME }}
          Type=Application
          Categories=Network;Chat;
          EOF
          
          ARCH=x86_64 ./appimagetool-x86_64.AppImage AppDir dist/linux/${{ env.APP_NAME }}-Linux-x86_64.AppImage

      - name: Prepare Linux release assets
        run: |
          mkdir -p release-assets
          cp dist/linux/deb/*.deb release-assets/ChatP2P-Linux.deb
          cp dist/linux/rpm/*.rpm release-assets/ChatP2P-Linux.rpm
          cp dist/linux/*.AppImage release-assets/ChatP2P-Linux-x86_64.AppImage

      - name: Upload Linux assets artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-release-assets
          path: release-assets/*
          if-no-files-found: error

  build-windows:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Build JAR
        run: mvn -B clean package

      - name: Verify JAR exists
        shell: pwsh
        run: |
          Get-ChildItem target
          if (!(Test-Path "target/${{ env.JAR_FILE }}")) {
            Write-Error "No existe target/${{ env.JAR_FILE }}"
            exit 1
          }

      - name: Install Inno Setup
        run: choco install innosetup --no-progress

      - name: Convert icon to ICO
        shell: pwsh
        run: |
          magick src/main/resources/view/favicon.png src/main/resources/view/favicon.ico

      - name: Build Windows App Image
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/windows | Out-Null
          jpackage `
            --type app-image `
            --name "${{ env.APP_NAME }}" `
            --input target `
            --main-jar "${{ env.JAR_FILE }}" `
            --main-class "${{ env.MAIN_CLASS }}" `
            --dest dist/windows `
            --icon "src\main\resources\view\favicon.ico" `
            --vendor "UPB" `
            --app-version "1.0.${{ github.run_number }}"

      - name: Create Inno Setup Script
        shell: pwsh
        run: |
          $appName = "${{ env.APP_NAME }}"
          $appVersion = "1.0.${{ github.run_number }}"
          $issContent = @"
          [Setup]
          AppName=$appName
          AppVersion=$appVersion
          DefaultDirName={localappdata}\Programs\$appName
          DefaultGroupName=$appName
          OutputDir=release-assets
          OutputBaseFilename=ChatP2P-Windows-Setup
          Compression=lzma2
          SolidCompression=yes
          ArchitecturesAllowed=x64
          ArchitecturesInstallIn64BitMode=x64
          PrivilegesRequired=lowest
          SetupIconFile=src\main\resources\view\favicon.ico
          
          [Files]
          Source: `"dist\windows\$appName\*`"; DestDir: `"{app}`"; Flags: ignoreversion recursesubdirs createallsubdirs

          [Icons]
          Name: `"{autoprograms}\$appName`"; Filename: `"{app}\$appName.exe`"
          Name: `"{autodesktop}\$appName`"; Filename: `"{app}\$appName.exe`"; Tasks: desktopicon

          [Tasks]
          Name: `"desktopicon`"; Description: `"Crear un acceso directo en el escritorio`"; GroupDescription: `"Iconos adicionales:`"

          [Run]
          Filename: `"{app}\$appName.exe`"; Description: `"Ejecutar $appName`"; Flags: nowait postinstall skipifsilent
          "@
          Set-Content -Path "installer.iss" -Value $issContent

      - name: Build Windows EXE installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

      - name: Upload Windows assets artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-assets
          path: release-assets/*
          if-no-files-found: error

  update-release:
    name: Update latest-main release
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Linux assets
        uses: actions/download-artifact@v4
        with:
          name: linux-release-assets
          path: release-assets

      - name: Download Windows assets
        uses: actions/download-artifact@v4
        with:
          name: windows-release-assets
          path: release-assets

      - name: Show release assets
        run: ls -lah release-assets

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Move latest-main tag to current commit
        run: |
          git tag -f "${{ env.RELEASE_TAG }}" "${GITHUB_SHA}"
          git push origin "refs/tags/${{ env.RELEASE_TAG }}" --force

      - name: Create release if missing
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ env.RELEASE_TAG }}" >/dev/null 2>&1; then
            echo "Release already exists"
          else
            gh release create "${{ env.RELEASE_TAG }}" \
              --title "ChatP2P Latest Main" \
              --notes "Build automática actualizada desde main." \
              --latest=false
          fi

      - name: Update release title and notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release edit "${{ env.RELEASE_TAG }}" \
            --title "ChatP2P Latest Main" \
            --notes "Build automática desde main

            Commit: ${GITHUB_SHA}
            Run: #${GITHUB_RUN_NUMBER}"

      - name: Upload / replace release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ env.RELEASE_TAG }}" \
            ./release-assets/ChatP2P-Windows-Setup.exe#Windows\ Installer \
            ./release-assets/ChatP2P-Linux.deb#Linux\ DEB \
            ./release-assets/ChatP2P-Linux.rpm#Linux\ RPM \
            ./release-assets/ChatP2P-Linux-x86_64.AppImage#Linux\ AppImage \
            --clobber